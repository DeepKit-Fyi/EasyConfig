; ConfigBuild 示例配置文件
; 此文件演示 INI + JSON 双文件模型中的简单属性

[Application]
; 基本信息
Name=示例应用程序
Version=1.0.0
Language=zh-CN
Theme=light

[Window]
; 窗口设置
Width=1024
Height=768
Left=100
Top=100
Maximized=false

[Database]
; 数据库连接（简单属性）
Type=SQLite
Path=data\app.db
Timeout=30
MaxConnections=5

[Logging]
; 日志设置
Enabled=true
Level=Info
MaxFileSize=10485760
MaxFiles=5
OutputPath=logs\

[Network]
; 网络设置
ProxyEnabled=false
ProxyHost=
ProxyPort=8080
Timeout=30000

[Security]
; 安全设置
RequireAuth=true
SessionTimeout=3600
AutoLock=true
AutoLockDelay=300

[Features]
; 功能开关
EnableAutoSave=true
AutoSaveInterval=300
ShowWelcome=true
CheckUpdates=true
