; ConfigEditor示例配置文件
; 演示INI+JSON双文件结构

[json_file]
file_path = app_config.json  ; 关联的JSON文件

[version]
etText.config_format_version = 1.0
etDateTime.last_updated = 2023-06-01T12:00:00Z

[app_settings]
etText.app_name = 应用程序示例
etText.version = 1.0.0
etText.language = zh-CN
etBoolean.debug_mode = true
etNumber.timeout = 30
etNumber.max_retry = 3

[ui_settings]
etEnum.theme = dark,light,custom
etColor.primary_color = #0078D7
etColor.secondary_color = #E81123
etBoolean.show_welcome = true
etBoolean.compact_mode = false
etNumber.sidebar_width = 250

[paths]
etPath.temp_dir = D:\temp
etPath.data_dir = D:\data
etFile.config_backup = D:\backup\config.bak
etFile.log_file = D:\logs\app.log

[scheduled_tasks]
etBoolean.auto_backup = true
etTimeSpan.backup_interval = 24:00:00  ; 24小时
etDateTime.next_backup = 2023-06-02T03:00:00Z 