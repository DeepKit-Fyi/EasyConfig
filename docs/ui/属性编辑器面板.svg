<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360">
  <style>
    .panel { fill:#f8f8f8; stroke:#999; stroke-width:1; }
    .title { fill:#333; font-family:"Segoe UI",sans-serif; font-size:14px; font-weight:bold; }
    .label { fill:#555; font-family:"Segoe UI",sans-serif; font-size:12px; }
    .border-dash { fill:none; stroke:#bbb; stroke-width:1; stroke-dasharray:4 4; }
  </style>

  <rect x="0" y="0" width="480" height="360" class="panel"/>
  <text x="16" y="24" class="title">属性编辑器（类似 Delphi 对象检查器）</text>

  <!-- 筛选栏 -->
  <rect x="12" y="32" width="456" height="28" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="18" y="50" class="label">搜索属性 / 分类 (Filter)</text>

  <!-- 属性网格 -->
  <rect x="12" y="66" width="456" height="282" class="border-dash"/>

  <!-- 类别：常规 -->
  <text x="18" y="86" class="label">[常规]</text>
  <text x="26" y="106" class="label">名称 (Name)</text>
  <text x="260" y="106" class="label">General.Age</text>
  <text x="26" y="126" class="label">类型 (ConfigType)</text>
  <text x="260" y="126" class="label">ctInteger</text>
  <text x="26" y="146" class="label">编辑器 (Editor)</text>
  <text x="260" y="146" class="label">etSpinEdit</text>

  <!-- 类别：显示 -->
  <text x="18" y="176" class="label">[显示]</text>
  <text x="26" y="196" class="label">分类 (Category)</text>
  <text x="260" y="196" class="label">用户信息</text>
  <text x="26" y="216" class="label">说明 (Description)</text>
  <text x="260" y="216" class="label">用户年龄，0-120</text>

  <!-- 类别：验证 -->
  <text x="18" y="246" class="label">[验证]</text>
  <text x="26" y="266" class="label">必填 (Required)</text>
  <text x="260" y="266" class="label">True</text>
  <text x="26" y="286" class="label">最小值 (Min)</text>
  <text x="260" y="286" class="label">0</text>
  <text x="26" y="306" class="label">最大值 (Max)</text>
  <text x="260" y="306" class="label">120</text>

  <!-- 类别：来源 -->
  <text x="18" y="336" class="label">[来源]  INI: [user]/age,  JSON: user.age</text>
</svg>
